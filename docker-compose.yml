```yml
version: '3'
services:
  backend:
    container_name: redsocial-backend
    image: node:latest
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    command: npm start
    depends_on:
      - mongodb
    environment:
      - DATABASE_URL=mongodb://mongodb:27017/redsocial

  frontend:
    container_name: redsocial-frontend
    image: node:latest
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "80:80"
    command: npm start
    depends_on:
      - backend

  mongodb:
    container_name: redsocial-mongodb
    image: mongo:latest
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo-data:
```